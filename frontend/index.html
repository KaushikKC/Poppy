<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Companion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Private Companion</h1>
      <span id="status-dot" class="dot idle" title="idle"></span>
    </header>

    <div id="avatar-wrap">
      <canvas id="avatar-canvas" width="220" height="220"></canvas>
    </div>

    <div id="transcript"></div>

    <form id="chat-form">
      <button type="button" id="mic-btn" title="Click to record, click again to send">
        <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-2.07A7 7 0 0 0 19 12h-2z"/>
        </svg>
      </button>
      <input
        id="user-input"
        type="text"
        placeholder="Type a message or click mic…"
        autocomplete="off"
        autofocus
      />
      <button type="submit" id="send-btn">Send</button>
      <button type="button" id="clear-btn">Clear</button>
    </form>
  </div>

  <script src="audio_player.js"></script>
  <script src="avatar.js"></script>
  <script src="chat.js"></script>
  <script src="mic.js"></script>
</body>
</html>
