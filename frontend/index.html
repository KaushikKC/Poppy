<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Private Companion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Full-page video presence: a real rendered person, idle ⇆ talking -->
  <div id="stage" class="poster-only">
    <img id="stage-poster" src="avatar/face.jpg" alt="" />
    <video id="video-idle" muted loop playsinline preload="auto">
      <source src="avatar/idle.webm" type="video/webm" />
      <source src="avatar/idle.mp4"  type="video/mp4" />
    </video>
    <video id="video-talk" muted loop playsinline preload="auto">
      <source src="avatar/talk.webm" type="video/webm" />
      <source src="avatar/talk.mp4"  type="video/mp4" />
    </video>
    <div id="stage-shade"></div>
  </div>

  <div id="app">
    <header>
      <h1>Private Companion</h1>
      <span id="status-dot" class="dot idle" title="idle"></span>
      <span id="latency-badge" title="last response latency"></span>
      <span id="accent-badge" title="detected accent"></span>
      <span id="gender-badge" title="detected voice gender"></span>
      <span id="emotion-badge" title="detected emotion"></span>
      <button type="button" id="memory-btn" title="What I remember about you">🧠</button>
    </header>

    <div id="memory-panel" class="hidden"></div>

    <div id="persona-picker"></div>
    <div id="persona-suggestion" class="hidden"></div>

    <!-- spacer keeps the person visible; chat + controls live at the bottom -->
    <div id="stage-spacer"></div>

    <div id="transcript"></div>

    <form id="chat-form">
      <button type="button" id="mic-btn" title="Click to record, click again to send">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-2.07A7 7 0 0 0 19 12h-2z"/>
        </svg>
      </button>
      <button type="button" id="vad-btn" title="Auto-listen">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 3a9 9 0 0 0-9 9 9 9 0 0 0 9 9 9 9 0 0 0 9-9 9 9 0 0 0-9-9zm0 2a7 7 0 0 1 7 7 7 7 0 0 1-7 7 7 7 0 0 1-7-7 7 7 0 0 1 7-7zm0 3a4 4 0 0 0-4 4 4 4 0 0 0 4 4 4 4 0 0 0 4-4 4 4 0 0 0-4-4zm0 2a2 2 0 0 1 2 2 2 2 0 0 1-2 2 2 2 0 0 1-2-2 2 2 0 0 1 2-2z"/>
        </svg>
      </button>
      <input
        id="user-input"
        type="text"
        placeholder="Type or click mic…"
        autocomplete="off"
        autofocus
      />
      <button type="submit" id="send-btn">Send</button>
      <button type="button" id="clear-btn">Clear</button>
    </form>
  </div>

  <script src="audio_player.js"></script>
  <script src="video_avatar.js"></script>
  <script src="vad.js"></script>
  <script src="persona_picker.js"></script>
  <script src="chat.js"></script>
  <script src="mic.js"></script>
  <script src="memory.js"></script>
</body>
</html>
