<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Avatar — lip-sync test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    html, body { height: 100%; background: #0b0b10; color: #e8e8ec;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #avatar { position: fixed; inset: 0; }
    #panel { position: fixed; left: 12px; bottom: 12px; right: 12px; z-index: 10;
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    button { padding: 10px 16px; border: none; border-radius: 10px; cursor: pointer;
      background: #7c6ef0; color: #fff; font-size: 14px; font-weight: 600; }
    button.secondary { background: rgba(255,255,255,0.14); }
    #log { position: fixed; top: 12px; left: 12px; right: 12px; max-height: 42vh; z-index: 10;
      overflow: auto; background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 10px 12px; font: 12px/1.5 ui-monospace, monospace;
      white-space: pre-wrap; backdrop-filter: blur(8px); }
    .ok { color: #5ced73; } .err { color: #ff6b6b; } .info { color: #9fb4ff; }
  </style>

  <!-- Three.js + TalkingHead as ES modules (CDN for this test; we vendor locally later) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/modules/talkinghead.mjs"
    }
  }
  </script>
</head>
<body>
  <div id="avatar"></div>

  <div id="log">3D avatar lip-sync test — loading…</div>

  <div id="panel">
    <input id="avatar-url" type="text" placeholder="Paste your Ready Player Me .glb URL…"
           style="flex:1; min-width:220px; padding:10px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.18); background:rgba(0,0,0,0.4); color:#e8e8ec; font-size:13px;" />
    <button id="load-btn" class="secondary">Load avatar</button>
    <button id="mic-btn">▶︎ Start mic lip-sync</button>
    <button id="nod-btn" class="secondary">Test head motion</button>
  </div>

  <script type="module">
    // ─── Avatar URL ────────────────────────────────────────────────────────────
    // Ready Player Me shut down (Jan 2026), so we default to TalkingHead's own
    // bundled demo avatar (brunette.glb — realistic, already viseme-rigged),
    // served via CDN. Paste another GLB in the box, or append ?avatar=<url>.
    // Other bundled options: avaturn.glb (realistic), vroid.glb (anime),
    // avatarsdk.glb, mpfb.glb — same folder.
    // Local, vendored avatars (avatar/brunette.glb, avatarsdk.glb, avaturn.glb,
    // mpfb.glb). Preview any with ?avatar=avatar/<name>.glb
    const DEFAULT_AVATAR = "avatar/brunette.glb";

    function buildAvatarUrl(raw) {
      let url = (raw || "").trim() || DEFAULT_AVATAR;
      // Only Ready Player Me-style URLs need the morphTargets query; pre-rigged
      // GLBs already contain the viseme blendshapes.
      if (/readyplayer\.me/.test(url) && !/morphTargets=/.test(url)) {
        url += (url.includes("?") ? "&" : "?") +
               "morphTargets=ARKit,Oculus%20Visemes&textureAtlas=1024&lod=1";
      }
      return url;
    }

    const params = new URLSearchParams(location.search);
    const AVATAR_URL = buildAvatarUrl(params.get("avatar"));

    const HEADAUDIO_BASE = "https://cdn.jsdelivr.net/gh/met4citizen/HeadAudio@main";
    // ───────────────────────────────────────────────────────────────────────────

    // "Load avatar" → reload the page with the pasted URL as ?avatar=
    document.getElementById("load-btn").addEventListener("click", () => {
      const v = document.getElementById("avatar-url").value.trim();
      if (!v) return;
      location.search = "?avatar=" + encodeURIComponent(v);
    });
    document.getElementById("avatar-url").value = params.get("avatar") || "";

    const logEl = document.getElementById("log");
    const log = (msg, cls = "") => {
      const line = document.createElement("div");
      if (cls) line.className = cls;
      line.textContent = msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
      console.log(msg);
    };
    window.addEventListener("error", (e) => log("window error: " + e.message, "err"));
    window.addEventListener("unhandledrejection", (e) => log("promise rejected: " + (e.reason?.message || e.reason), "err"));

    let head, headaudio;

    try {
      log("importing TalkingHead + three…", "info");
      const { TalkingHead } = await import("talkinghead");

      head = new TalkingHead(document.getElementById("avatar"), {
        // We never use TalkingHead's own TTS (lips come from HeadAudio), but the
        // constructor insists on an endpoint — give it a dummy so it initializes.
        ttsEndpoint: "/no-tts",
        lipsyncModules: ["en"],
        cameraView: "upper",
        avatarMood: "neutral",
        modelPixelRatio: Math.min(window.devicePixelRatio, 2),
      });
      log("TalkingHead created. Loading avatar GLB…", "info");

      await head.showAvatar(
        { url: AVATAR_URL, body: "F", avatarMood: "neutral", lipsyncLang: "en" },
        (ev) => { if (ev.lengthComputable) log(`  …avatar ${(ev.loaded/ev.total*100).toFixed(0)}%`); }
      );
      log("✓ Avatar loaded & rendering. It should blink and look around.", "ok");
      // diagnostic: confirm the avatar exposes viseme morph targets HeadAudio can drive
      const vkeys = head.mtAvatar ? Object.keys(head.mtAvatar).filter(k => k.startsWith("viseme")) : [];
      log(`morph targets: ${head.mtAvatar ? Object.keys(head.mtAvatar).length : "NO mtAvatar!"} total, visemes: ${vkeys.slice(0,6).join(", ") || "NONE"}`, vkeys.length ? "ok" : "err");
    } catch (err) {
      log("✗ Avatar failed to load: " + err.message, "err");
      log("→ The sample avatar URL may be unavailable. Create your own at readyplayer.me and set AVATAR_ID.", "err");
    }

    // ── HeadAudio: real-time visemes from any audio signal ───────────────────────
    async function initHeadAudio(ctx) {
      const { HeadAudio } = await import(`${HEADAUDIO_BASE}/modules/headaudio.mjs`);
      await ctx.audioWorklet.addModule(`${HEADAUDIO_BASE}/modules/headworklet.mjs`);
      const ha = new HeadAudio(ctx, {
        parameterData: { vadGateActiveDb: -45, vadGateInactiveDb: -65 },
      });
      await ha.loadModel(`${HEADAUDIO_BASE}/dist/model-en-mixed.bin`);
      ha.onstarted = () => log("…speech detected", "info");
      ha.onended   = () => log("…silence", "info");
      let _vlog = 0, _vmiss = false;
      ha.onvalue = (key, value) => {
        const slot = head?.mtAvatar?.[key];
        if (slot) {
          Object.assign(slot, { newvalue: value, needsUpdate: true });
          if (value > 0.2 && Date.now() - _vlog > 600) { _vlog = Date.now(); log(`viseme ${key} = ${value.toFixed(2)} ✓`, "ok"); }
        } else if (!_vmiss) {
          _vmiss = true;
          log(`✗ no morph slot for "${key}" — avatar/TalkingHead viseme keys don't match`, "err");
        }
      };
      // tick HeadAudio inside TalkingHead's render loop so morphs update each frame
      if (head) head.opt.update = ha.update.bind(ha);
      return ha;
    }

    document.getElementById("mic-btn").addEventListener("click", async (e) => {
      try {
        const ctx = head ? head.audioCtx : new AudioContext();
        if (ctx.state === "suspended") await ctx.resume();
        if (!headaudio) { log("initializing HeadAudio…", "info"); headaudio = await initHeadAudio(ctx); log("✓ HeadAudio ready", "ok"); }

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const src = ctx.createMediaStreamSource(stream);
        src.connect(headaudio);
        e.target.textContent = "🎙 Speak — lips should move";
        e.target.disabled = true;
        log("✓ Mic connected → talk and watch the avatar's mouth.", "ok");
      } catch (err) {
        log("✗ mic/HeadAudio error: " + err.message, "err");
      }
    });

    document.getElementById("nod-btn").addEventListener("click", () => {
      try { head?.playGesture?.("ok", 2); head?.lookAtCamera?.(500); log("nudged head motion", "info"); }
      catch (err) { log("gesture error: " + err.message, "err"); }
    });
  </script>
</body>
</html>
